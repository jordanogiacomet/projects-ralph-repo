<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FBF5EE"/>
      <stop offset="100%" stop-color="#F0E6D8"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8DDD0"/>
      <stop offset="100%" stop-color="#D4C5B2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9B99A"/>
      <stop offset="100%" stop-color="#B5A488"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#D4C5B2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4C5B2" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- Subtle organic shapes background -->
  <circle cx="300" cy="200" r="250" fill="#EDE3D5" opacity="0.4"/>
  <circle cx="1300" cy="700" r="300" fill="#EDE3D5" opacity="0.3"/>
  <circle cx="900" cy="100" r="150" fill="#E8DDD0" opacity="0.2"/>
  <!-- Tall bottle -->
  <g transform="translate(580, 180)">
    <!-- Bottle body -->
    <rect x="0" y="120" width="100" height="420" rx="12" fill="url(#bottle)" stroke="#C9B99A" stroke-width="1"/>
    <!-- Bottle neck -->
    <rect x="25" y="60" width="50" height="70" rx="4" fill="url(#bottle)" stroke="#C9B99A" stroke-width="1"/>
    <!-- Bottle cap -->
    <rect x="20" y="30" width="60" height="35" rx="6" fill="url(#accent)"/>
    <!-- Label area -->
    <rect x="15" y="250" width="70" height="120" rx="4" fill="none" stroke="#C9B99A" stroke-width="0.5" opacity="0.6"/>
    <!-- Label lines (text placeholders) -->
    <line x1="30" y1="290" x2="70" y2="290" stroke="#B5A488" stroke-width="1" opacity="0.5"/>
    <line x1="35" y1="305" x2="65" y2="305" stroke="#B5A488" stroke-width="0.5" opacity="0.4"/>
    <line x1="32" y1="320" x2="68" y2="320" stroke="#B5A488" stroke-width="0.5" opacity="0.4"/>
  </g>
  <!-- Round jar -->
  <g transform="translate(780, 340)">
    <!-- Jar body -->
    <rect x="0" y="60" width="160" height="130" rx="20" fill="url(#bottle)" stroke="#C9B99A" stroke-width="1"/>
    <!-- Jar lid -->
    <rect x="-5" y="30" width="170" height="40" rx="10" fill="url(#accent)"/>
    <!-- Label -->
    <circle cx="80" cy="125" r="30" fill="none" stroke="#C9B99A" stroke-width="0.5" opacity="0.5"/>
    <line x1="65" y1="125" x2="95" y2="125" stroke="#B5A488" stroke-width="0.5" opacity="0.4"/>
  </g>
  <!-- Small tube -->
  <g transform="translate(1020, 300)">
    <!-- Tube body -->
    <rect x="0" y="100" width="70" height="260" rx="35" fill="url(#bottle)" stroke="#C9B99A" stroke-width="1"/>
    <!-- Tube top -->
    <rect x="20" y="70" width="30" height="40" rx="4" fill="url(#accent)"/>
    <circle cx="35" cy="70" r="12" fill="url(#accent)"/>
    <!-- Label lines -->
    <line x1="20" y1="220" x2="50" y2="220" stroke="#B5A488" stroke-width="0.5" opacity="0.4"/>
    <line x1="25" y1="235" x2="45" y2="235" stroke="#B5A488" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Decorative botanical elements -->
  <g stroke="#C9B99A" stroke-width="1" fill="none" opacity="0.3">
    <!-- Left branch -->
    <path d="M200,500 Q230,480 250,450 Q260,430 255,400"/>
    <ellipse cx="248" cy="430" rx="15" ry="25" transform="rotate(-20,248,430)"/>
    <ellipse cx="260" cy="405" rx="12" ry="20" transform="rotate(-30,260,405)"/>
    <ellipse cx="235" cy="460" rx="14" ry="22" transform="rotate(-10,235,460)"/>
    <!-- Right decoration -->
    <path d="M1350,350 Q1330,330 1320,300 Q1315,280 1320,260"/>
    <ellipse cx="1322" cy="290" rx="12" ry="20" transform="rotate(15,1322,290)"/>
    <ellipse cx="1315" cy="320" rx="14" ry="22" transform="rotate(5,1315,320)"/>
  </g>
  <!-- Shadow beneath products -->
  <ellipse cx="750" cy="720" rx="350" ry="20" fill="url(#shadow)"/>
  <!-- Subtle dots pattern -->
  <g fill="#D4C5B2" opacity="0.15">
    <circle cx="100" cy="100" r="2"/>
    <circle cx="150" cy="100" r="2"/>
    <circle cx="200" cy="100" r="2"/>
    <circle cx="100" cy="150" r="2"/>
    <circle cx="150" cy="150" r="2"/>
    <circle cx="200" cy="150" r="2"/>
    <circle cx="1400" cy="100" r="2"/>
    <circle cx="1450" cy="100" r="2"/>
    <circle cx="1500" cy="100" r="2"/>
    <circle cx="1400" cy="150" r="2"/>
    <circle cx="1450" cy="150" r="2"/>
    <circle cx="1500" cy="150" r="2"/>
  </g>
</svg>
